<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Consumer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    a {
      color: #66FCF1;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    /*body {
      font-family: 'Poppins', sans-serif;
      background-color: #1F2833;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #C5C6C7;
    }*/

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0B0C10, #1F2833, #28414c);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #C5C6C7;
    }

    /* Smooth animated gradient */
    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
    }

    body::before {
      background: #66FCF1;
      top: 10%;
      left: 10%;
    }

    body::after {
      background: #45A29E;
      bottom: 10%;
      right: 10%;
    }

    h1 {
      text-align: center;
      color: #66FCF1;
      margin-bottom: 30px;
      font-size: 26px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
    }

    .container {
      background-color: #0B0C10;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(102, 252, 241, 0.1);
      text-align: center;
      min-width: 380px;
      border: 1px solid rgba(69, 162, 158, 0.3);
      transition: box-shadow 0.4s ease;
    }

    /*.container {
      background: rgba(11, 12, 16, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      padding: 40px 50px;
      border-radius: 12px;
      border: 1px solid rgba(102, 252, 241, 0.2);
      min-width: 380px;
      box-shadow: 0 0 30px rgba(102, 252, 241, 0.1);
      transition: box-shadow 0.4s ease;
    }*/

    .container:hover {
      box-shadow: 0 0 35px rgba(102, 252, 241, 0.25);
    }

    #connectBtn,
    #verifyBtn {
      width: 100%;
      max-width: 300px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    #connectBtn {
      background: linear-gradient(90deg, #45A29E, #66FCF1);
      color: #0B0C10;
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
    }

    #connectBtn:hover {
      box-shadow: 0 0 25px rgba(102, 252, 241, 0.6);
      transform: scale(1.05);
    }

    #verifyBtn {
      background: linear-gradient(90deg, #66FCF1, #45A29E);
      color: #0B0C10;
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
    }

    #verifyBtn:hover:enabled {
      box-shadow: 0 0 25px rgba(102, 252, 241, 0.6);
      transform: scale(1.05);
    }

    #verifyBtn:disabled {
      background: #2E3B45;
      color: #8a8b8c;
      cursor: not-allowed;
      box-shadow: none;
    }

    input[type="number"],
    input[type="text"] {
      width: 300px;
      padding: 10px;
      border: 1px solid #45A29E;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 15px;
      background-color: #1F2833;
      color: #C5C6C7;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #66FCF1;
      box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
      outline: none;
    }

    p {
      margin: 10px 0 5px;
      font-size: 15px;
      color: #C5C6C7;
    }

    #walletAddress {
      margin-top: 10px;
      font-weight: bold;
      word-break: break-all;
      color: #66FCF1;
      text-shadow: 0 0 6px rgba(102, 252, 241, 0.3);
    }

    #verifyResult {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
      color: #45A29E;
    }

    .success {
      background: rgba(102, 252, 241, 0.1);
      color: #66FCF1;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .error {
      background: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome, {{ session.name }}</h1>
    <br>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <p class="{{ category }}">{{ message }}</p>
    {% endfor %}
    {% endwith %}

    <button id="connectBtn">Connect MetaMask</button>
    <p id="walletAddress"></p>
    <br>
    <p>Item ID:</p>
    <input type="number" id="verifyItemId" placeholder="Item ID">

    <p>Enter public proof</p>
    <input type="text" id="inputC">

    <p>Enter public signal</p>
    <input type="text" id="publicSignal">

    <br>
    <button id="verifyBtn" disabled>Verify Item</button>
    <p id="verifyResult"></p>
    <br>
    <a href="/logout">Logout</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/consumer.js') }}"></script>
</body>

</html>
