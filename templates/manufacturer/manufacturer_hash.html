<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HashTest Contract Interaction</title>
  <style>
    /*body {
      font-family: Arial, sans-serif;
      background: #1F2833;
      color: #C5C6C7;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }*/
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0B0C10, #1F2833, #28414c);
      background-size: 400% 400%;
      animation: gradientMove 7s ease infinite;

      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      /* allow content to grow */
      margin: 0;
      padding: 40px 0;
      /* optional padding top+bottom for breathing */
      color: #C5C6C7;
      overflow-y: auto;
      /* allow vertical scroll if content overflows */
      position: relative;

    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
    }

    body::before {
      background: #1b524f;
      top: 10%;
      left: 10%;
    }

    body::after {
      background: #275d5a;
      bottom: 10%;
      right: 10%;
    }

    h2 {
      color: #66FCF1;
    }

    .container {
      background-color: #0B0C10;
      padding: 36px 40px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(102, 252, 241, 0.1);
      text-align: center;
      width: 100%;
      max-width: 560px;
      border: 1px solid rgba(69, 162, 158, 0.3);
      transition: box-shadow 0.4s ease;
      margin-bottom: 20px;
    }

    .container:hover {
      box-shadow: 0 0 35px rgba(102, 252, 241, 0.25);
    }

    input {
      width: 80%;
      padding: 8px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      outline: none;
      text-align: center;
      background: #C5C6C7;
      color: #1F2833;
      font-weight: bold;
    }

    button {
      background: #66FCF1;
      color: #1F2833;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #45A29E;
      color: #C5C6C7;
    }

    .output {
      margin-top: 20px;
      background: rgba(69, 162, 158, 0.2);
      padding: 10px;
      border-radius: 10px;
      word-break: break-all;
      color: #C5C6C7;
    }

    #walletAddress {
      font-size: 0.9em;
      color: #66FCF1;
      margin-top: 10px;
    }

    a {
      color: #66FCF1;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome, {{ session.name }}</h1>
    <br>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <p class="{{ category }}">{{ message }}</p>
    {% endfor %}
    {% endwith %}
    <br>
    <p>Enter array values for <b>a</b> and <b>b</b></p>

    <input id="a0" type="number" placeholder="a[0]" required />
    <input id="a1" type="number" placeholder="a[1]" required /><br>

    <input id="b00" type="number" placeholder="b[0][0]" required />
    <input id="b01" type="number" placeholder="b[0][1]" required />
    <input id="b10" type="number" placeholder="b[1][0]" required />
    <input id="b11" type="number" placeholder="b[1][1]" required /><br>

    <button id="connectBtn">Connect Wallet</button>
    <p id="walletAddress"></p>
    <button id="getHashes" disabled>Get Hashes</button>

    <div class="output" id="output"></div>
    <br>
    <a href="/logout">Logout</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <script>
    let contract;
    const contractAddress = "0xEAD57c7F7352c5858706C1ed4b1A8e10bd71bC1b";
    const abi = [
      "function getHashes(uint[2] calldata a, uint[2][2] calldata b) external pure returns (uint256,uint256,uint256)"
    ];

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById("connectBtn").addEventListener("click", connectWallet);
      document.getElementById("getHashes").addEventListener("click", getHashes);
    });

    async function connectWallet() {
      if (!window.ethereum) {
        alert("MetaMask not found! Please install it.");
        return;
      }

      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, abi, signer);

        document.getElementById("getHashes").disabled = false;
        document.getElementById("walletAddress").innerText = `Connected: ${accounts[0]}`;
        document.getElementById("connectBtn").innerText = "Connected";

        console.log("Connected to MetaMask:", accounts[0]);
      } catch (err) {
        console.error(err);
        alert("Failed to connect MetaMask: " + err.message);
      }
    }

    async function getHashes() {
      if (!contract) {
        alert("Please connect your wallet first.");
        return;
      }

      const a = [
        parseInt(document.getElementById("a0").value),
        parseInt(document.getElementById("a1").value)
      ];
      const b = [
        [
          parseInt(document.getElementById("b00").value),
          parseInt(document.getElementById("b01").value)
        ],
        [
          parseInt(document.getElementById("b10").value),
          parseInt(document.getElementById("b11").value)
        ]
      ];

      try {
        const result = await contract.getHashes(a, b);

        const c = [
          result[0].toString(),
          "0"
        ];
        const publicSignals = [result[2].toString()];

        const outputData = {
          a: [a[0].toString(), a[1].toString()],
          b: [
            [b[0][0].toString(), b[0][1].toString()],
            [b[1][0].toString(), b[1][1].toString()]
          ],
          c: c,
          publicSignals: publicSignals
        };

        document.getElementById("output").innerHTML = `
      <p><b>Hash 1 (Proof Signal C):</b> ${result[0].toString()}</p>
      <p><b>Hash 2 (Intermediate Hash):</b> ${result[1].toString()}</p>
      <p><b>Hash 3 (Public Signal):</b> ${result[2].toString()}</p>
      <p style="color:#66FCF1;margin-top:10px;">JSON file generated</p>
    `;

        const response = await fetch("/save-proof-json", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(outputData)
        });

        const saveResult = await response.json();

        if (saveResult.success) {
          document.getElementById("output").innerHTML += `
    <p style="color:#66FCF1;margin-top:10px;">JSON saved successfully</p>
    <a href="${saveResult.file_url}" download style="color:#66FCF1;">Download JSON File</a>
  `;
        } else {
          document.getElementById("output").innerHTML += `
    <p style="color:red;">Failed to save JSON file.</p>
  `;
        }


      } catch (err) {
        console.error(err);
        document.getElementById("output").innerHTML = `<p style="color:red;">Failed to fetch hashes. Please check your input.</p>`;

      }
    }

  </script>
</body>

</html>
