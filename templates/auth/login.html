<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <style>
        /*body {
            font-family: 'Poppins', sans-serif;
            background-color: #1F2833;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #C5C6C7;
        }*/
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0B0C10, #1F2833, #28414c);
            background-size: 400% 400%;
            animation: gradientMove 7s ease infinite;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #C5C6C7;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }

        body::before {
            background: #1b524f;
            top: 10%;
            left: 10%;
        }

        body::after {
            background: #275d5a;
            bottom: 10%;
            right: 10%;
        }

        .container {
            background-color: #0B0C10;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.1);
            text-align: center;
            min-width: 350px;
            border: 1px solid rgba(69, 162, 158, 0.3);
            transition: 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 0 35px rgba(102, 252, 241, 0.25);
        }

        h2 {
            color: #66FCF1;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
        }

        input {
            width: 280px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #45A29E;
            background-color: #1F2833;
            color: #C5C6C7;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #66FCF1;
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
            outline: none;
        }

        button {
            width: 300px;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg, #45A29E, #66FCF1);
            color: #0B0C10;
            transition: 0.3s ease;
            box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.6);
        }
        a {
            color: #66FCF1;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        .success {
            background: rgba(102, 252, 241, 0.1);
            color: #66FCF1;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .error {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <p class="{{ category }}">{{ message }}</p>
        {% endfor %}
        {% endwith %}
        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email" required><br>

            <input type="password" name="password" placeholder="Password" required><br>

            <button type="submit">Login</button>
        </form>

        <br>
        <a href="/register">New user? Register</a>
    </div>
</body>

</html>
